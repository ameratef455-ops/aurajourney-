name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_APIKEY: ${{ secrets.VITE_APIKEY }}
      VITE_AUTHDOMAIN: ${{ secrets.VITE_AUTHDOMAIN }}
      VITE_PROJECTID: ${{ secrets.VITE_PROJECTID }}
      VITE_STORAGEBUCKET: ${{ secrets.VITE_STORAGEBUCKET }}
      VITE_MESSAGINGSENDERID: ${{ secrets.VITE_MESSAGINGSENDERID }}
      VITE_APPID: ${{ secrets.VITE_APPID }}
      VITE_DATABASEID: ${{ secrets.VITE_DATABASEID }}
      VITE_MEASUREMENTID: ${{ secrets.VITE_MEASUREMENTID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.SERVICE_ACCOUNT_RESTORA_NURSING }}'
          channelId: live
          projectId: restora-nursing
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
